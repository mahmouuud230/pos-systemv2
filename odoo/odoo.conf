[options]

; ── Database ──────────────────────────────────────────────────────────────────
db_host = postgres
db_port = 5432
db_user = odoo
db_password = OdooSaaS_Pg_2025!

; ── Multi-tenancy ─────────────────────────────────────────────────────────────
; TESTING:  both lines below are commented out (prefixed with ;)
; PRODUCTION: remove the ; from both lines
;db_filter  = ^%d$
;list_db    = False

; ── Master password ───────────────────────────────────────────────────────────
admin_passwd = OdooMaster_2025!

; ── Proxy ─────────────────────────────────────────────────────────────────────
proxy_mode       = True
workers          = 0
longpolling_port = 8072

; ── Performance ───────────────────────────────────────────────────────────────
limit_memory_hard    = 671088640
limit_memory_soft    = 629145600
limit_time_cpu       = 60
limit_time_real      = 120
limit_time_real_cron = 0
max_cron_threads     = 1

; ── Request protection ────────────────────────────────────────────────────────
; Max size of HTTP request body in bytes (128MB)
; Protects against large file upload attacks
limit_request        = 8192

; ── Threads ───────────────────────────────────────────────────────────────────
; Max HTTP threads when workers = 0 (threaded mode)
; 8 is safe for a small VPS — handles 8 simultaneous requests
max_http_threads     = 8

; ── Logging ───────────────────────────────────────────────────────────────────
; Log to file inside the container — persisted via odoo-data volume
logfile          = /var/lib/odoo/odoo.log
log_level        = warn
log_rotate_count = 5
log_rotate_size  = 50

; ── Paths ─────────────────────────────────────────────────────────────────────
data_dir    = /var/lib/odoo
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; ── Sessions ──────────────────────────────────────────────────────────────────
session_db = True
